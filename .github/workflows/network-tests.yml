name: Network tests

# Smoke tests that download real dictionaries and ONNX models from the
# kotoshu/* repos. Excluded from CI by default (the suite honours
# NETWORK_TESTS=1); this workflow opts in so we catch breakage in the
# download/cache/verification pipeline early.
#
# Runs nightly on the main branch and on manual dispatch.

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'lib/kotoshu/cache/**'
      - 'lib/kotoshu/source_registry.rb'
      - 'lib/kotoshu/integrity.rb'
      - 'lib/kotoshu/integrity/**'
      - 'lib/kotoshu/resource_manager.rb'
      - 'lib/kotoshu/resource_bundle.rb'
      - '.github/workflows/network-tests.yml'

permissions:
  contents: read

jobs:
  network:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.3'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run network-tagged specs
        env:
          NETWORK_TESTS: '1'
        run: bundle exec rspec --tag network --format documentation

      - name: Notify on failure (nightly only)
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            core.info(`Nightly network tests failed: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`)
