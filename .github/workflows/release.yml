# Release workflow using RubyGems trusted publishing (OIDC).
#
# Does NOT use the relaton/support reusable workflow — that workflow
# requires rubygems-api-key as a declared secret, which prevents
# trusted publishing from working when the secret isn't configured.
# This standalone version uses the
# rubygems/configure-rubygems-credentials action directly for OIDC.
#
# Does NOT use `gem bump` (provided by the `gemman` gem) — that
# command isn't available in a stock rubygems install. Version
# bumping is done inline via sed + git.
name: release

permissions:
  contents: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      next_version:
        description: |
          Next release version. Possible values: x.y.z, major, minor, patch (or pre|rc|etc).
          Also, you can pass 'skip' to skip 'git tag' and do 'gem push' for the current version
        required: true
        default: 'skip'
  repository_dispatch:
    types: [do-release]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Configure RubyGems credentials (trusted publishing via OIDC)
        uses: rubygems/configure-rubygems-credentials@v1.0.0
        with:
          oidc: true

      - name: Determine version
        id: version
        run: |
          CURRENT=$(ruby -e "require './lib/kotoshu/version'; puts Kotoshu::VERSION")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          NEXT_INPUT="${{ github.event.inputs.next_version }}"
          if [ "$NEXT_INPUT" = "skip" ]; then
            echo "next=$CURRENT" >> $GITHUB_OUTPUT
            echo "skip_bump=true" >> $GITHUB_OUTPUT
          elif echo "$NEXT_INPUT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "next=$NEXT_INPUT" >> $GITHUB_OUTPUT
            echo "skip_bump=false" >> $GITHUB_OUTPUT
          else
            # Semantic-bump shorthand (major/minor/patch) — compute the
            # next version from CURRENT without depending on `gem bump`.
            BUMPED=$(ruby -e "
              current = '${CURRENT}'.split('.').map(&:to_i)
              case '${NEXT_INPUT}'
              when 'major' then current[0] += 1; current[1] = 0; current[2] = 0
              when 'minor' then current[1] += 1; current[2] = 0
              when 'patch' then current[2] += 1
              else abort \"unsupported bump: ${NEXT_INPUT}\"
              end
              print current.join('.')
            ")
            echo "next=$BUMPED" >> $GITHUB_OUTPUT
            echo "skip_bump=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump version, commit, tag, push
        if: steps.version.outputs.skip_bump != 'true'
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          # Rewrite lib/kotoshu/version.rb in place.
          sed -i -E "s/VERSION = '[0-9.]+'/VERSION = '${NEXT}'/" lib/kotoshu/version.rb
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add lib/kotoshu/version.rb
          git commit -m "chore: bump VERSION to ${NEXT} for release"
          git tag "v${NEXT}"
          git push origin "${{ github.ref_name }}"
          git push origin "v${NEXT}"

      - name: Build gem
        run: gem build kotoshu.gemspec

      - name: Push gem (trusted publishing)
        run: gem push kotoshu-*.gem
