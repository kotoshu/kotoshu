# Release workflow using RubyGems trusted publishing (OIDC).
#
# Does NOT use the relaton/support reusable workflow — that workflow
# requires rubygems-api-key as a declared secret, which prevents
# trusted publishing from working when the secret isn't configured.
# This standalone version uses the
# rubygems/configure-rubygems-credentials action directly for OIDC.
name: release

permissions:
  contents: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      next_version:
        description: |
          Next release version. Possible values: x.y.z, major, minor, patch (or pre|rc|etc).
          Also, you can pass 'skip' to skip 'git tag' and do 'gem push' for the current version
        required: true
        default: 'skip'
  repository_dispatch:
    types: [do-release]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Configure RubyGems credentials (trusted publishing via OIDC)
        uses: rubygems/configure-rubygems-credentials@v1
        with:
          oidc: true

      - name: Determine version
        id: version
        run: |
          CURRENT=$(ruby -e "require './lib/kotoshu/version'; puts Kotoshu::VERSION")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          NEXT="${{ github.event.inputs.next_version }}"
          if [ "$NEXT" = "skip" ]; then
            echo "next=$CURRENT" >> $GITHUB_OUTPUT
            echo "skip_bump=true" >> $GITHUB_OUTPUT
          elif echo "$NEXT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "next=$NEXT" >> $GITHUB_OUTPUT
            echo "skip_bump=false" >> $GITHUB_OUTPUT
          else
            BUMPED=$(gem bump --no-commit --version "$NEXT" 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | tail -1)
            git checkout -- lib/kotoshu/version.rb 2>/dev/null || true
            echo "next=$BUMPED" >> $GITHUB_OUTPUT
            echo "skip_bump=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump version and tag
        if: steps.version.outputs.skip_bump != 'true'
        run: |
          gem bump --version ${{ steps.version.outputs.next }} --tag --push

      - name: Build gem
        run: gem build kotoshu.gemspec

      - name: Push gem (trusted publishing)
        run: gem push kotoshu-*.gem
