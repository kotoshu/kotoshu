name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
      - 'feat/**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Ruby ${{ matrix.ruby }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.1'
          - '3.2'
          - '3.3'
          - '3.4'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run test suite
        run: bundle exec rspec --format documentation

      - name: Run RuboCop
        run: bundle exec rubocop --parallel

  build:
    name: Build gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build gem
        run: gem build kotoshu.gemspec

      - name: Verify gem version matches version.rb
        run: |
          DECLARED=$(ruby -r./lib/kotoshu/version -e 'puts Kotoshu::VERSION')
          BUILT=$(ls kotoshu-*.gem | sed -E 's/kotoshu-(.+)\.gem/\1/')
          echo "Declared: $DECLARED"
          echo "Built:    $BUILT"
          test "$DECLARED" = "$BUILT"

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: kotoshu-gem
          path: kotoshu-*.gem
          if-no-files-found: error
          retention-days: 14
