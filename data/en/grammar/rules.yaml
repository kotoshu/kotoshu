  # ==========================================================================
  # Double Negative Rule
  # ==========================================================================
  - id: EN_DOUBLE_NEGATIVE
    name: "Double Negative"
    category: style
    severity: style
    description: |
      Avoid double negatives in formal English as they can be confusing.
    patterns:
      - context:
          target_tokens:
            - not
            - no
            - neither
            - nobody
            - never
            - nothing
            - nowhere
            - hardly
            - barely
            - scarcely
          pattern: multiple_negatives
        conditions:
          - type: distance_check
            max_distance: 15
            description: Check if another negative word appears within range
    exceptions:
      phrases:
        - not only but also
        - not...without
    message: 'Double negative detected - consider rephrasing'
    suggestion: 'Consider using a single negative'
