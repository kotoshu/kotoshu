# English Grammar Rules Configuration
# All linguistic data in dictionary, not hardcoded

metadata:
  language: en
  version: "1.0"
  last_updated: "2026-02-03"

rules:
  # ==========================================================================
  # Article Usage Rule: "a" vs "an"
  # ==========================================================================
  - id: EN_A_VS_AN
    name: "a vs an"
    category: articles
    severity: suggestion
    description: |
      Use "an" before vowel sounds and "a" before consonant sounds.
    patterns:
      - context:
          antecedent:
            - token: { regex: "^[aA]$" }
              pos_tag: ["DET", "ART"]
            - token: { regex: "^[aA]n$" }
              pos_tag: ["DET", "ART"]
          consequent:
            token: { regex: "." }
            pos_tag: any
        conditions:
          - type: vowel_check
            description: Check if word starts with vowel sound
            function: vowel_sound_check
    exceptions:
      vowel_sounds: [a, e, i, o, u]
      consonant_sound_exceptions:
        - one
        - once
        - unicorn
        - university
        - european
      silent_consonant_exceptions:
        - hour
        - heir
        - honest
        - herb
    message: 'Use "{expected}" before "{word}"'
    suggestion: null
    suggestions:
      - type: single
        template: "{expected}"

  # ==========================================================================
  # There/Their/They're Confusion Rule
  # ==========================================================================
  - id: EN_THERE_THEIR
    name: "there/their/they're"
    category: confusion
    severity: warning
    description: |
      Use "their" for possession, "there" for location/existence,
      and "they're" for contraction of "they are".
    patterns:
      - context:
          target_token: "there"
          position: any
        conditions:
          - type: context_check
            description: Check if "there" should be "their"
            function: check_possessive_context
