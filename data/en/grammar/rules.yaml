# English Grammar Rules Configuration
# All linguistic data in dictionary, not hardcoded

metadata:
  language: en
  version: "1.0"
  last_updated: "2026-02-03"

rules:
  # ==========================================================================
  # Article Usage Rule: "a" vs "an"
  # ==========================================================================
  - id: EN_A_VS_AN
    name: "a vs an"
    category: articles
    severity: suggestion
    description: |
      Use "an" before vowel sounds and "a" before consonant sounds.
    patterns:
      - context:
          antecedent:
            - token: { regex: "^[aA]$" }
              pos_tag: ["DET", "ART"]
            - token: { regex: "^[aA]n$" }
              pos_tag: ["DET", "ART"]
          consequent:
            token: { regex: "." }
            pos_tag: any
        conditions:
          - type: vowel_check
            description: Check if word starts with vowel sound
            function: vowel_sound_check
    exceptions:
      vowel_sounds: [a, e, i, o, u]
      consonant_sound_exceptions:
        - one
        - once
        - unicorn
        - university
        - european
      silent_consonant_exceptions:
        - hour
        - heir
        - honest
        - herb
    message: 'Use "{expected}" before "{word}"'
    suggestion: null
    suggestions:
      - type: single
        template: "{expected}"

