  # ==========================================================================
  # Double Negative Rule
  # ==========================================================================
  - id: EN_DOUBLE_NEGATIVE
    name: "Double Negative"
    category: style
    severity: style
    description: |
      Avoid double negatives in formal English as they can be confusing.
    patterns:
      - context:
          target_tokens:
            - not
            - no
            - neither
            - nobody
            - never
            - nothing
            - nowhere
            - hardly
            - barely
            - scarcely
          pattern: multiple_negatives
        conditions:
          - type: distance_check
            max_distance: 15
            description: Check if another negative word appears within range
    exceptions:
      phrases:
        - not only but also
        - not...without
    message: 'Double negative detected - consider rephrasing'
    suggestion: 'Consider using a single negative'

  # ==========================================================================
  # Phrase Confusion Rules: phonetic confusions where each word is valid
  # individually but the combination is wrong.
  # ==========================================================================
  - id: EN_COULD_OF
    name: "could of → could have"
    category: grammar
    severity: error
    description: |
      "could of" is a phonetic misspelling of "could have" (the
      contraction "could've" sounds like "could of"). The same
      applies to should/would/must/might of.
    patterns:
      - conditions:
          - type: phrase_check
            wrong_phrase: "could of"
            suggestion: "could have"
    message: '"could of" should be "could have"'
    suggestion: 'could have'

  - id: EN_SHOULD_OF
    name: "should of → should have"
    category: grammar
    severity: error
    description: |
      "should of" is a phonetic misspelling of "should have".
    patterns:
      - conditions:
          - type: phrase_check
            wrong_phrase: "should of"
            suggestion: "should have"
    message: '"should of" should be "should have"'
    suggestion: 'should have'

  - id: EN_WOULD_OF
    name: "would of → would have"
    category: grammar
    severity: error
    description: |
      "would of" is a phonetic misspelling of "would have".
    patterns:
      - conditions:
          - type: phrase_check
            wrong_phrase: "would of"
            suggestion: "would have"
    message: '"would of" should be "would have"'
    suggestion: 'would have'

  - id: EN_MUST_OF
    name: "must of → must have"
    category: grammar
    severity: error
    description: |
      "must of" is a phonetic misspelling of "must have".
    patterns:
      - conditions:
          - type: phrase_check
            wrong_phrase: "must of"
            suggestion: "must have"
    message: '"must of" should be "must have"'
    suggestion: 'must have'

  - id: EN_MIGHT_OF
    name: "might of → might have"
    category: grammar
    severity: error
    description: |
      "might of" is a phonetic misspelling of "might have".
    patterns:
      - conditions:
          - type: phrase_check
            wrong_phrase: "might of"
            suggestion: "might have"
    message: '"might of" should be "might have"'
    suggestion: 'might have'

  - id: EN_IN_REGARDS_TO
    name: "in regards to → in regard to"
    category: grammar
    severity: suggestion
    description: |
      "In regards to" is non-standard. The correct form is "in regard to"
      (singular "regard").
    patterns:
      - conditions:
          - type: phrase_check
            wrong_phrase: "in regards to"
            suggestion: "in regard to"
    message: '"in regards to" should be "in regard to"'
    suggestion: 'in regard to'

  - id: EN_ASK_FOR_ADVICE
    name: "advise vs advice"
    category: grammar
    severity: suggestion
    description: |
      "advise" is a verb; "advice" is a noun. Common phrase confusion:
      "I need an advise" should be "I need advice".
    patterns:
      - conditions:
          - type: phrase_check
            wrong_phrase: "an advise"
            suggestion: "some advice"
    message: '"an advise" should be "advice" (noun, uncountable)'
    suggestion: 'advice'

  - id: EN_SUPPOSE_TO
    name: "suppose to → supposed to"
    category: grammar
    severity: error
    description: |
      "suppose to" (without the 'd') is a common misspelling of
      "supposed to" — the final consonant of "supposed" is silent
      in connected speech.
    patterns:
      - conditions:
          - type: phrase_check
            wrong_phrase: "suppose to"
            suggestion: "supposed to"
    message: '"suppose to" should be "supposed to"'
    suggestion: 'supposed to'

  - id: EN_USE_TO
    name: "use to → used to"
    category: grammar
    severity: error
    description: |
      "use to" (without the 'd') is a common misspelling of
      "used to" — same phonetic confusion as "suppose to".
    patterns:
      - conditions:
          - type: phrase_check
            wrong_phrase: "use to"
            suggestion: "used to"
    message: '"use to" should be "used to"'
    suggestion: 'used to'

  - id: EN_ITS_IT_S
    name: "its/it's"
    category: confusion
    severity: warning
    description: |
      "its" (no apostrophe) is the possessive pronoun — like "his"
      or "her". "it's" (with apostrophe) is a contraction of "it is"
      or "it has". When "its" is followed by an adjective, adverb,
      or past participle, the writer usually meant the contraction.
    message: "Did you mean \"it's\" (contraction of \"it is\")?"
    suggestion: "it's"
    patterns:
      - context:
          target_token: "its"
          trigger_when_followed_by:
            tags: [ADJ, ADV]
            words:
              - been
              - going
              - getting
              - becoming
              - appearing
              - seeming
              - looking
              - feeling
              - sounding
              - tasting
              - smelling
        conditions:
          - type: possessive_contraction_check

  - id: EN_YOUR_YOURE
    name: "your/you're"
    category: confusion
    severity: warning
    description: |
      "your" is the possessive pronoun. "you're" is a contraction of
      "you are". When "your" is followed by an adjective or past
      participle, the writer usually meant the contraction.
    message: "Did you mean \"you're\" (contraction of \"you are\")?"
    suggestion: "you're"
    patterns:
      - context:
          target_token: "your"
          trigger_when_followed_by:
            tags: [ADJ, ADV]
            words:
              - going
              - getting
              - becoming
              - coming
              - leaving
              - arriving
              - doing
              - making
              - saying
              - thinking
              - feeling
              - looking
              - sounding
        conditions:
          - type: possessive_contraction_check

  - id: EN_WHOSE_WHOS
    name: "whose/who's"
    category: confusion
    severity: warning
    description: |
      "whose" is the possessive form of "who". "who's" is a
      contraction of "who is" or "who has". When "whose" is followed
      by a verb form, the writer usually meant the contraction.
    message: "Did you mean \"who's\" (contraction of \"who is\")?"
    suggestion: "who's"
    patterns:
      - context:
          target_token: "whose"
          trigger_when_followed_by:
            tags: [VERB]
            words:
              - coming
              - going
              - here
              - there
              - talking
              - speaking
              - calling
              - looking
              - watching
              - working
              - doing
              - making
              - been
              - got
        conditions:
          - type: possessive_contraction_check

  - id: EN_SENTENCE_START_CAP
    name: "Sentence start capitalization"
    category: capitalization
    severity: error
    description: |
      The first word of a sentence should be capitalized. Sentence
      boundaries are: the start of the stream, or any token whose
      final character is ".", "!", or "?".
    message: "Sentences should start with a capital letter"
    suggestion: "Capitalize the first letter"
    patterns:
      - conditions:
          - type: sentence_start_check
