inherit_from:
  - https://raw.githubusercontent.com/riboseinc/oss-guides/main/ci/rubocop.yml

plugins:
- rubocop-performance
- rubocop-rake
- rubocop-rspec

AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'debug_*.rb'
    - 'test_*.rb'
    - 'bin/**/*'
    - 'vendor/**/*'
    - 'tmp/**/*'

# The inherited ribose guide enforces double_quotes; the codebase is mixed.
# Disable string-literal style enforcement until the codebase is consistent.
Style/StringLiterals:
  Enabled: false

Style/StringLiteralsInInterpolation:
  Enabled: false

Style/QuotedSymbols:
  Enabled: false

Style/TrailingCommaInArguments:
  Enabled: false

Style/TrailingCommaInArrayLiteral:
  Enabled: false

Style/TrailingCommaInHashLiteral:
  Enabled: false

# 80-column limit creates excessive wrapping in spec/lib DSL blocks.
Layout/LineLength:
  Max: 200

# RSpec design cops are too strict for this project's spec style.
RSpec/MultipleExpectations:
  Enabled: false

RSpec/ExampleLength:
  Enabled: false

RSpec/DescribedClass:
  Enabled: false

RSpec/MultipleDescribes:
  Enabled: false

RSpec/ContextWording:
  Enabled: false

RSpec/DescribeClass:
  Enabled: false

RSpec/InstanceVariable:
  Enabled: false

RSpec/RepeatedExample:
  Enabled: false

RSpec/RepeatedDescription:
  Enabled: false

RSpec/BeEq:
  Enabled: false

RSpec/BeNil:
  Enabled: false

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/NestedGroups:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Enabled: false

RSpec/LeakyConstantDeclaration:
  Enabled: false

RSpec/LeakyLocalVariable:
  Enabled: false

RSpec/IdenticalEqualityAssertion:
  Enabled: false

RSpec/BeforeAfterAll:
  Enabled: false

RSpec/ExpectActual:
  Enabled: false

RSpec/Output:
  Enabled: false

RSpec/IncludeExamples:
  Enabled: false

RSpec/MessageSpies:
  Enabled: false

RSpec/MatchWithSimpleRegex:
  Enabled: false

RSpec/StubbedMock:
  Enabled: false

# Spell-checking algorithms (Hunspell port) are naturally branchy and long.
# Raise thresholds well above the inherited guide's defaults.
Metrics/MethodLength:
  Max: 160

Metrics/AbcSize:
  Enabled: false

Metrics/CyclomaticComplexity:
  Max: 70

Metrics/PerceivedComplexity:
  Max: 70

Metrics/ParameterLists:
  Max: 15

Metrics/BlockLength:
  Enabled: false

Metrics/BlockNesting:
  Max: 6

# Allow common short parameter names used throughout (id, io, db, ...).
Naming/MethodParameterName:
  Enabled: false

Naming/VariableNumber:
  Enabled: false

Naming/PredicateMethod:
  Enabled: false

Naming/PredicatePrefix:
  Enabled: false

Naming/BlockForwarding:
  Enabled: false

Naming/MemoizedInstanceVariableName:
  Enabled: false

# These need manual review; silence for now to unblock CI.
Lint/MissingSuper:
  Enabled: false

Lint/DuplicateBranch:
  Enabled: false

Lint/DuplicateMethods:
  Enabled: false

Lint/IneffectiveAccessModifier:
  Enabled: false

Lint/ConstantDefinitionInBlock:
  Enabled: false

Lint/NonAtomicFileOperation:
  Enabled: false

Lint/RedundantSafeNavigation:
  Enabled: false

Lint/AmbiguousRange:
  Enabled: false

Lint/UnusedMethodArgument:
  Enabled: false

Lint/HashCompareByIdentity:
  Enabled: false

Lint/UnexpectedBlockArity:
  Enabled: false

Lint/BinaryOperatorWithIdenticalOperands:
  Enabled: false

Lint/DuplicateCaseCondition:
  Enabled: false

Lint/MixedRegexpCaptureTypes:
  Enabled: false

Lint/ReturnInVoidContext:
  Enabled: false

Lint/StructNewOverride:
  Enabled: false

Lint/UselessAssignment:
  Enabled: false

# Opinionated style; existing code uses comparisons freely.
Style/NumericPredicate:
  Enabled: false

Style/SafeNavigation:
  Enabled: false

Style/HashEachMethods:
  Enabled: false

Style/StringConcatenation:
  Enabled: false

Style/CombinableLoops:
  Enabled: false

Style/SlicingWithRange:
  Enabled: false

Style/OneClassPerFile:
  Enabled: false

Style/FormatStringToken:
  Enabled: false

Style/ArrayIntersect:
  Enabled: false

Style/ComparableBetween:
  Enabled: false

Style/ComparableClamp:
  Enabled: false

Style/CaseLikeIf:
  Enabled: false

Style/IdenticalConditionalBranches:
  Enabled: false

Style/InverseMethods:
  Enabled: false

Style/ReduceToHash:
  Enabled: false

Style/RedundantArgument:
  Enabled: false

Style/RedundantFetchBlock:
  Enabled: false

Style/ReturnNilInPredicateMethodDefinition:
  Enabled: false

Style/SelectByRegexp:
  Enabled: false

Style/StringChars:
  Enabled: false

Style/MinMaxComparison:
  Enabled: false

Style/RedundantEach:
  Enabled: false

Style/MapToSet:
  Enabled: false

Style/MapIntoArray:
  Enabled: false

Style/MapJoin:
  Enabled: false

# Auto-correction of these cops has caused regressions; require manual review.
Style/ArgumentsForwarding:
  Enabled: false

Style/RedundantInitialize:
  Enabled: false

# Performance micro-optimizations that don't change correctness.
Performance/CollectionLiteralInLoop:
  Enabled: false

Performance/MapCompact:
  Enabled: false

Performance/MapMethodChain:
  Enabled: false

Performance/StringInclude:
  Enabled: false

Performance/TimesMap:
  Enabled: false

Performance/Sum:
  Enabled: false

Performance/UnfreezeString:
  Enabled: false

Gemspec/OrderedDependencies:
  Enabled: false

Bundler/OrderedGems:
  Enabled: false

Style/EmptyElse:
  Enabled: false

Style/NegatedIfElseCondition:
  Enabled: false

Style/RedundantRegexpEscape:
  Enabled: false

Style/RedundantRegexpCharacterClass:
  Enabled: false

Style/MutableConstant:
  Enabled: false

Lint/ScriptPermission:
  Enabled: false

Layout/CaseIndentation:
  Enabled: false

Layout/LineEndStringConcatenationIndentation:
  Enabled: false

Performance/RegexpMatch:
  Enabled: false

# URI.open is intentional in cache download paths; we validate URLs upstream.
Security/Open:
  Enabled: false
